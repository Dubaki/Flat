<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent left bar -->
  <rect x="0" y="0" width="10" height="630" fill="url(#accent)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#2563eb" opacity="0.06"/>
  <circle cx="1100" cy="500" r="150" fill="#3b82f6" opacity="0.05"/>

  <!-- Logo icon -->
  <rect x="80" y="100" width="72" height="72" rx="16" fill="#2563eb"/>
  <text x="116" y="151" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="white" text-anchor="middle">🔨</text>

  <!-- Company name -->
  <text x="80" y="260" font-family="Arial Black, Arial, sans-serif" font-size="100" font-weight="900" fill="white">Дядя</text>
  <text x="80" y="360" font-family="Arial Black, Arial, sans-serif" font-size="100" font-weight="900" fill="#2563eb">Фёдор</text>

  <!-- Tagline -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="34" fill="#94a3b8">Ремонт квартир в Екатеринбурге без посредников</text>

  <!-- Features row -->
  <text x="80" y="500" font-family="Arial, sans-serif" font-size="24" fill="#475569">✓ Капитальный от 14 500 ₽/м²</text>
  <text x="420" y="500" font-family="Arial, sans-serif" font-size="24" fill="#475569">✓ Договор и смета</text>
  <text x="680" y="500" font-family="Arial, sans-serif" font-size="24" fill="#475569">✓ Гарантия 3 года</text>

  <!-- Divider -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#1e3a6e" stroke-width="1"/>

  <!-- Domain -->
  <text x="80" y="585" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2563eb">uf66.ru</text>
  <text x="300" y="585" font-family="Arial, sans-serif" font-size="24" fill="#334155">• Екатеринбург и Свердловская область</text>
</svg>
