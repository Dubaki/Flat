name: Deploy Website to Reg.ru (SFTP)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Flat/package-lock.json

      - name: 📦 Install dependencies
        run: npm install
        working-directory: Flat

      - name: 🏗️ Build project
        run: npm run build
        working-directory: Flat

      - name: 🚀 Sync files via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: Flat/dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          protocol: sftp
          port: 22
          delete-destination: false # Не удалять файлы на сервере, которых нет в dist (безопаснее)
